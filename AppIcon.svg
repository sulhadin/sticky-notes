<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- macOS squircle mask -->
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>

    <!-- Deep premium dark background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1C1C2A"/>
      <stop offset="100%" stop-color="#0C0C16"/>
    </linearGradient>

    <!-- Ambient glow - warm, centered on front note -->
    <radialGradient id="ambientGlow" cx="0.48" cy="0.46" r="0.45">
      <stop offset="0%" stop-color="#F5D6BA" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#E3C8A8" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== NOTE COLOR GRADIENTS ===== -->

    <!-- Back note: Purple -->
    <linearGradient id="purpleNote" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#EADCF8"/>
      <stop offset="100%" stop-color="#D5C0EC"/>
    </linearGradient>

    <!-- Middle note: Blue -->
    <linearGradient id="blueNote" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#D4E2F8"/>
      <stop offset="100%" stop-color="#B8CCF0"/>
    </linearGradient>

    <!-- Front note: Warm Gold -->
    <linearGradient id="goldNote" x1="0.1" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FBE8D0"/>
      <stop offset="35%" stop-color="#F5D6BA"/>
      <stop offset="100%" stop-color="#E8C4A0"/>
    </linearGradient>

    <!-- Fold gradient - darker gold -->
    <linearGradient id="foldFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0BF9A"/>
      <stop offset="100%" stop-color="#D0A878"/>
    </linearGradient>

    <linearGradient id="foldUnder" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C89868"/>
      <stop offset="100%" stop-color="#B88858"/>
    </linearGradient>

    <!-- Fold cast shadow -->
    <linearGradient id="foldCastShadow" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Sheen overlay -->
    <linearGradient id="noteSheen" x1="0.15" y1="0" x2="0.7" y2="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Gold note text lines -->
    <linearGradient id="lineGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B7050" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#A08060" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#A08060" stop-opacity="0"/>
    </linearGradient>

    <!-- Back note text lines -->
    <linearGradient id="linePurple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9070B8" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#A888C8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="lineBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6088C0" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#7A9CCE" stop-opacity="0"/>
    </linearGradient>

    <!-- Pin - brushed silver metallic -->
    <linearGradient id="pinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F0F2"/>
      <stop offset="25%" stop-color="#D8D8DC"/>
      <stop offset="50%" stop-color="#C0C0C6"/>
      <stop offset="75%" stop-color="#D8D8DC"/>
      <stop offset="100%" stop-color="#A8A8B0"/>
    </linearGradient>

    <radialGradient id="pinHighlight" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="pinShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadows -->
    <filter id="backNoteShadow" x="-8%" y="-5%" width="120%" height="125%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="midNoteShadow" x="-8%" y="-5%" width="120%" height="125%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="frontNoteShadow" x="-10%" y="-5%" width="125%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.50"/>
    </filter>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.40"/>
    </radialGradient>

    <!-- Color dots gradient highlights -->
    <radialGradient id="dotHighlight" cx="0.35" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Ambient glow -->
    <rect width="1024" height="1024" fill="url(#ambientGlow)"/>

    <!-- ===== BACK NOTE - Purple (rotated right) ===== -->
    <g filter="url(#backNoteShadow)">
      <g transform="rotate(8, 512, 480)">
        <rect x="240" y="210" width="544" height="590" rx="6" fill="url(#purpleNote)"/>
        <rect x="240" y="210" width="544" height="590" rx="6" fill="url(#noteSheen)" opacity="0.5"/>
        <rect x="310" y="340" width="280" height="14" rx="7" fill="url(#linePurple)"/>
        <rect x="310" y="400" width="220" height="14" rx="7" fill="url(#linePurple)"/>
        <rect x="310" y="460" width="260" height="14" rx="7" fill="url(#linePurple)"/>
      </g>
    </g>

    <!-- ===== MIDDLE NOTE - Blue (rotated left) ===== -->
    <g filter="url(#midNoteShadow)">
      <g transform="rotate(-5, 512, 480)">
        <rect x="230" y="200" width="564" height="610" rx="6" fill="url(#blueNote)"/>
        <rect x="230" y="200" width="564" height="610" rx="6" fill="url(#noteSheen)" opacity="0.4"/>
        <rect x="305" y="330" width="320" height="14" rx="7" fill="url(#lineBlue)"/>
        <rect x="305" y="390" width="240" height="14" rx="7" fill="url(#lineBlue)"/>
        <rect x="305" y="450" width="290" height="14" rx="7" fill="url(#lineBlue)"/>
        <rect x="305" y="510" width="180" height="14" rx="7" fill="url(#lineBlue)"/>
      </g>
    </g>

    <!-- ===== FRONT NOTE - Gold (main, slight tilt) ===== -->
    <g filter="url(#frontNoteShadow)">
      <g transform="rotate(-1.5, 512, 490)">
        <!-- Note body with fold cutout -->
        <path d="M 220 185 L 804 185 L 804 660 L 645 830 L 220 830 Z"
              fill="url(#goldNote)"/>

        <!-- Top/left edge highlight -->
        <path d="M 220 830 L 220 185 L 804 185"
              fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-opacity="0.45"/>

        <!-- Bottom/right edge shadow -->
        <path d="M 804 185 L 804 660 L 645 830 L 220 830"
              fill="none" stroke="#000000" stroke-width="1" stroke-opacity="0.10"/>

        <!-- Sheen -->
        <path d="M 220 185 L 804 185 L 804 660 L 645 830 L 220 830 Z"
              fill="url(#noteSheen)"/>

        <!-- Fold cast shadow -->
        <path d="M 645 660 L 804 660 L 645 830 Z"
              fill="url(#foldCastShadow)"/>

        <!-- Fold underside -->
        <path d="M 645 830 L 712 730 L 804 660 Z"
              fill="url(#foldUnder)"/>

        <!-- Fold front face -->
        <path d="M 645 830 L 645 660 L 712 730 Z"
              fill="url(#foldFront)"/>

        <!-- Fold highlight -->
        <line x1="645" y1="660" x2="712" y2="730" stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.35"/>

        <!-- Fold creases -->
        <line x1="645" y1="660" x2="645" y2="830" stroke="#A08060" stroke-width="0.8" stroke-opacity="0.3"/>
        <line x1="645" y1="660" x2="804" y2="660" stroke="#A08060" stroke-width="0.8" stroke-opacity="0.2"/>

        <!-- Clean, bold text lines - visible at any size -->
        <rect x="290" y="310" width="360" height="16" rx="8" fill="url(#lineGold)"/>
        <rect x="290" y="380" width="280" height="14" rx="7" fill="url(#lineGold)"/>
        <rect x="290" y="440" width="320" height="14" rx="7" fill="url(#lineGold)"/>
        <rect x="290" y="500" width="230" height="14" rx="7" fill="url(#lineGold)"/>
        <rect x="290" y="560" width="300" height="14" rx="7" fill="url(#lineGold)"/>
        <rect x="290" y="620" width="200" height="14" rx="7" fill="url(#lineGold)"/>
        <rect x="290" y="680" width="260" height="14" rx="7" fill="url(#lineGold)"/>

        <!-- ===== METALLIC PIN ===== -->
        <ellipse cx="510" cy="220" rx="20" ry="7" fill="url(#pinShadow)"/>
        <line x1="504" y1="148" x2="508" y2="210" stroke="#808088" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="504" y1="148" x2="508" y2="210" stroke="#B0B0B8" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="504" cy="132" r="32" fill="url(#pinGrad)" stroke="#A0A0A8" stroke-width="1"/>
        <circle cx="504" cy="132" r="22" fill="none" stroke="#FFFFFF" stroke-width="0.6" stroke-opacity="0.2"/>
        <circle cx="504" cy="132" r="32" fill="url(#pinHighlight)"/>
        <circle cx="494" cy="122" r="5" fill="white" opacity="0.65"/>
      </g>
    </g>

    <!-- ===== COLOR PALETTE DOTS (bottom) ===== -->
    <g transform="translate(512, 920)">
      <!-- Silver -->
      <circle cx="-100" cy="0" r="15" fill="#E3E4E6" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.3"/>
      <circle cx="-100" cy="0" r="15" fill="url(#dotHighlight)"/>
      <!-- Space Gray -->
      <circle cx="-60" cy="0" r="15" fill="#B8B8BD" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.3"/>
      <circle cx="-60" cy="0" r="15" fill="url(#dotHighlight)"/>
      <!-- Gold -->
      <circle cx="-20" cy="0" r="15" fill="#F5D6BA" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.5"/>
      <circle cx="-20" cy="0" r="15" fill="url(#dotHighlight)"/>
      <!-- Rose Gold -->
      <circle cx="20" cy="0" r="15" fill="#F2C6C1" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.3"/>
      <circle cx="20" cy="0" r="15" fill="url(#dotHighlight)"/>
      <!-- Blue -->
      <circle cx="60" cy="0" r="15" fill="#C7D8F5" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.3"/>
      <circle cx="60" cy="0" r="15" fill="url(#dotHighlight)"/>
      <!-- Purple -->
      <circle cx="100" cy="0" r="15" fill="#E2D1F5" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.3"/>
      <circle cx="100" cy="0" r="15" fill="url(#dotHighlight)"/>
    </g>

    <!-- Vignette -->
    <rect width="1024" height="1024" fill="url(#vignette)"/>
  </g>
</svg>
